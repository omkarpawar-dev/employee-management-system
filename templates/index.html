<!DOCTYPE html>
<html>

<head>
<title>Employee Management System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-light bg-light mb-4 p-3">
    <span class="navbar-brand mb-0 h4">Cloud Employee System</span>

    <div>
        <a href="/dashboard" class="btn btn-outline-primary btn-sm">Dashboard</a>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
</nav>

<h2 class="mb-4">Employee Management</h2>

<!-- ADD EMPLOYEE -->
<div class="card p-3 mb-4">

<h4>Add Employee</h4>

<div class="row g-2">

<div class="col">
<input id="name" class="form-control" placeholder="Name">
</div>

<div class="col">
<input id="email" class="form-control" placeholder="Email">
</div>

<div class="col">
<input id="department" class="form-control" placeholder="Department">
</div>

<div class="col">
<input id="role" class="form-control" placeholder="Role">
</div>

<div class="col">
<button class="btn btn-primary w-100" onclick="addEmployee()">Add</button>
</div>

</div>
</div>


<!-- EMPLOYEE TABLE -->
<div class="card p-3">

<h4>Employees</h4>

<input class="form-control mb-3" placeholder="Search employee"
onkeyup="searchEmployee(this.value)">

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

</div>


<script>

let employees=[];

// 🔐 Check login before loading page
fetch('/dashboard')
.then(res=>{
    if(res.redirected){
        window.location.href="/login";
    }
});


function loadEmployees(){

fetch('/employees')
.then(res=>res.json())
.then(data=>{

employees=data;
renderTable(data);

});

}


function renderTable(data){

let table="";

data.forEach(emp=>{

table+=`
<tr>
<td>${emp.id}</td>
<td>${emp.name}</td>
<td>${emp.email}</td>
<td>${emp.department}</td>
<td>${emp.role}</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="deleteEmployee(${emp.id})">
Delete
</button>

</td>

</tr>
`;

});

document.getElementById("employeeTable").innerHTML=table;

}


function addEmployee(){

let employee={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
department:document.getElementById("department").value,
role:document.getElementById("role").value
};

fetch('/employees',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(employee)
})
.then(()=>{
loadEmployees();
});

}


function deleteEmployee(id){

fetch('/employees/'+id,{
method:'DELETE'
})
.then(()=>{
loadEmployees();
});

}


function searchEmployee(text){

let filtered=employees.filter(e=>
e.name.toLowerCase().includes(text.toLowerCase())
);

renderTable(filtered);

}


loadEmployees();

</script>

</body>
</html>
